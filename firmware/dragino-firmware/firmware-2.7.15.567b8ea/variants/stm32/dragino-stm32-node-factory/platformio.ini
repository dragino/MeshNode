[env:dragino-stm32-node-factory]
extends = stm32_base
board = lora_e5_dev_board
board_level = pr
board_upload.maximum_size =  260096
; reserve the last 2KB internal flash page for Dragino FactoryIdentity
build_flags =
  ${stm32_base.build_flags}
  -Ivariants/stm32/dragino-stm32-node-factory
  -DSERIAL_UART_INSTANCE=2
  -DPIN_SERIAL_RX=PA3
  -DPIN_SERIAL_TX=PA2
  ;-DPIN_WIRE_SDA=PA11
  ;-DPIN_WIRE_SCL=PA12
  -DHAS_SENSOR=1
  -DENABLE_HWSERIAL1
  -DPIN_SERIAL2_TX=PB6
  -DPIN_SERIAL2_RX=PB7
  -DHAS_GPS=1
  -DGPS_SERIAL_PORT=Serial1
  ;-DSTM32WL_USE_EXTENDED_FREE_HEAP=1
  ; Temporary diagnostics for external flash factory reset tracing.
  ;-DDEBUG_HEAP
  -DDRAGINO=1
  -DDRAGINO_REMOTENODE=1
  -DDRAGINO_STM32=1
  -DDRAGINO_FACTORY_FIRMWARE=1
  -DDRAGINO_FACTORY_IDENTITY_RESERVED=1
  -DMAX_NUM_NODES=10

upload_port = stlink

lib_deps =
  ${stm32_base.lib_deps}
  # Add your custom sensor here!
