[env:wio-e5]
extends = stm32_base
board = lora_e5_dev_board
board_level = pr
board_upload.maximum_size =  262144
; board_upload.maximum_size = 233472 
; reserve the last 28KB for filesystem
build_flags =
  ${stm32_base.build_flags}
  -Ivariants/stm32/wio-e5
  -DSERIAL_UART_INSTANCE=2
  -DPIN_SERIAL_RX=PA3
  -DPIN_SERIAL_TX=PA2
  ;-DPIN_WIRE_SDA=PA11
  ;-DPIN_WIRE_SCL=PA12
  -DHAS_SENSOR=1
  -DENABLE_HWSERIAL1
  -DPIN_SERIAL2_TX=PB6
  -DPIN_SERIAL2_RX=PB7
  -DHAS_GPS=1
  -DGPS_SERIAL_PORT=Serial1
  -DSTM32WL_USE_EXTENDED_FREE_HEAP=1
  ; Temporary diagnostics for external flash factory reset tracing.
  -DDEBUG_HEAP


upload_port = stlink

lib_deps =
  ${stm32_base.lib_deps}
  # Add your custom sensor here!
