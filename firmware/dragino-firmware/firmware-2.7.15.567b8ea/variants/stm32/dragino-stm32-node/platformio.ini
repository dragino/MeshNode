[env:dragino-stm32-node]
extends = stm32_base
board = lora_e5_dev_board
board_level = pr
board_upload.maximum_size =  260096
; reserve the last 2KB internal flash page for Dragino FactoryIdentity
build_flags =
  ${stm32_base.build_flags}
  -Ivariants/stm32/dragino-stm32-node
  -DSERIAL_UART_INSTANCE=2
  -DPIN_SERIAL_RX=PA3
  -DPIN_SERIAL_TX=PA2
  ;-DPIN_WIRE_SDA=PA11
  ;-DPIN_WIRE_SCL=PA12
  -DHAS_SENSOR=1
  -DENABLE_HWSERIAL1
  -DPIN_SERIAL2_TX=PB6
  -DPIN_SERIAL2_RX=PB7
  -DHAS_GPS=1
  -DGPS_SERIAL_PORT=Serial1
  ;-DSTM32WL_USE_EXTENDED_FREE_HEAP=1
  ; Temporary diagnostics for external flash factory reset tracing.
  ;-DDEBUG_HEAP
  ;-DDEBUG_MUTE
  -DDRAGINO=1
  -DDRAGINO_REMOTENODE=1
  -DDRAGINO_STM32=1

  -DDRAGINO_STM32_STOP_RESUME=1
  -DDRAGINO_STM32_STOP_RESUME_FALLBACK_RESET=1
  -DDRAGINO_STM32_STOP_RESUME_TRACE=1

  -DDRAGINO_STM32_SLEEP_WAKE_GATE=1
  -DDRAGINO_SLEEP_WAKE_HOLD_MS=5000UL
  -DDRAGINO_SLEEP_WAKE_BLINK_START_MS=3000UL
  -DDRAGINO_SLEEP_WAKE_SHORT_ACK_MS=3000UL
  -DDRAGINO_SLEEP_WAKE_SECOND_PRESS_MS=1000UL
  -DDRAGINO_FACTORY_IDENTITY_RESERVED=1
  -DDRAGINO_BUTTON_DEBUG_SLEEP_ENABLE=1
  ; Disable Dragino automatic factory/sync wakeup sleep for always-awake test units.
  -DDRAGINO_AUTO_SLEEP_ENABLE=1

  -DMAX_NUM_NODES=10

upload_port = stlink

lib_deps =
  ${stm32_base.lib_deps}
  # Add your custom sensor here!

[env:dragino-stm32-node-sht3x]
extends = env:dragino-stm32-node
build_flags =
  ${env:dragino-stm32-node.build_flags}
  -DMESHTASTIC_EXCLUDE_I2C=0
  -DDRAGINO_SENSOR_PROFILE=1
  -DDRAGINO_SENSOR_PROFILE_SHT3X=1
  -DDRAGINO_SHT3X_ENABLE=1
  -DDRAGINO_SENSOR_BUSINESS_DATA_ENABLE=1
  -DPIN_WIRE_SDA=PA11
  -DPIN_WIRE_SCL=PA12
  -DI2C_SDA=PA11
  -DI2C_SCL=PA12
  -DDRAGINO_SHT3X_ADDR_PRIMARY=0x44
  -DDRAGINO_SHT3X_ADDR_ALT=0x45
  -DDRAGINO_SHT3X_I2C_CLOCK_HZ=100000
  -DDRAGINO_SHT3X_POWER_STABILIZE_MS=20
  -DDRAGINO_SHT3X_MEASURE_WAIT_MS=20
  -DDRAGINO_SHT3X_READ_RETRIES=3
  -DDRAGINO_SHT3X_SOFT_RESET_WAIT_MS=10
  -DDRAGINO_SHT3X_SAMPLE_INTERVAL_MS=200
  -DDRAGINO_SHT3X_FILTER_WINDOW_MS=10000
  -DDRAGINO_SHT3X_FILTER_POOL_SIZE=20
  -DDRAGINO_SHT3X_SERIAL_PRINT=1





[env:dragino-stm32-node-app]
extends = env:dragino-stm32-node
board_build.flash_offset = 0x7800
board_upload.offset_address = 0x08007800
board_upload.maximum_size = 250704
build_flags =
  ${env:dragino-stm32-node.build_flags}
  -DDEBUG_MUTE
  -DDRAGINO_STM32_IWDG_ENABLE=1
  -DDRAGINO_STM32_IWDG_BOOTLOADER_HANDOFF=1
  -DDRAGINO_STM32_IWDG_TIMEOUT_US=32000000UL
  -DDRAGINO_STM32_IWDG_FEED_INTERVAL_MS=10000UL
  -DDRAGINO_STM32_IWDG_SLEEP_MODE=DRAGINO_STM32_IWDG_SLEEP_FREEZE
  -DDRAGINO_STM32_IWDG_AUTO_CONFIG_OPTION_BYTES=1
  ;-DDRAGINO_BOOT_TRACE


[env:dragino-stm32-node-sht3x-app]
extends = env:dragino-stm32-node-sht3x
board_build.flash_offset = 0x7800
board_upload.offset_address = 0x08007800
board_upload.maximum_size = 253952
build_flags =
  ${env:dragino-stm32-node-sht3x.build_flags}
  -DDEBUG_MUTE
  -DDRAGINO_STM32_IWDG_ENABLE=1
  -DDRAGINO_STM32_IWDG_BOOTLOADER_HANDOFF=1
  -DDRAGINO_STM32_IWDG_TIMEOUT_US=32000000UL
  -DDRAGINO_STM32_IWDG_FEED_INTERVAL_MS=10000UL
  -DDRAGINO_STM32_IWDG_SLEEP_MODE=DRAGINO_STM32_IWDG_SLEEP_FREEZE
  -DDRAGINO_STM32_IWDG_AUTO_CONFIG_OPTION_BYTES=1
  -DDRAGINO_SLEEP_DEBUG_TRACE=1
  -DDRAGINO_SHT3X_I2C_RELEASE_DELAY_MS=5
  -DDRAGINO_SHT3X_POWER_OFF_SETTLE_MS=500











[env:dragino-stm32-node-ota-lab]
extends = env:dragino-stm32-node
build_flags =
  ${env:dragino-stm32-node.build_flags}
  -DDRAGINO_OTA_LAB=1
